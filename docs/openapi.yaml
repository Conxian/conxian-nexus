openapi: 3.0.3
info:
  title: Conxian Nexus (Glass Node) API
  description: High-performance middleware for Stacks L1 state synchronization and multi-protocol support.
  version: 0.4.4
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /v1/status:
    get:
      summary: Get system status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  state_root:
                    type: string
                  mmr_root:
                    type: string
                  processed_height:
                    type: integer
                  safety_mode:
                    type: boolean
                  drift:
                    type: integer
  /v1/metrics:
    get:
      summary: Get system metrics (JSON)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_transactions:
                    type: integer
                  total_blocks:
                    type: integer
                  safety_mode:
                    type: boolean
                  drift:
                    type: integer
                  uptime_seconds:
                    type: integer
  /metrics:
    get:
      summary: Get Prometheus metrics (Text)
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /v1/proof:
    get:
      summary: Get Merkle proof for a transaction
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string
                  proof:
                    type: string
  /v1/mmr-proof:
    get:
      summary: Get MMR inclusion proof for a transaction
      parameters:
        - name: index
          in: query
          schema:
            type: integer
        - name: tx_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaf:
                    type: string
                  pos:
                    type: integer
                  siblings:
                    type: array
                    items:
                      type: array
                      items:
                        oneOf:
                          - type: integer
                          - type: string
                  peaks:
                    type: array
                    items:
                      type: string
                  root:
                    type: string
  /v1/verify-state:
    post:
      summary: Verify a state root
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state_root:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  mmr_root:
                    type: string
  /v1/bitvm2/verify-state-root:
    post:
      summary: Verify a BitVM2 state root SNARK proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - state_root
                - proof
              properties:
                state_root:
                  type: string
                proof:
                  type: string
                public_inputs:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bitvm2StateRootVerificationResponse'
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bitvm2StateRootVerificationResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bitvm2StateRootVerificationResponse'
  /v1/execute:
    post:
      summary: Execute a transaction via FSOC Sequencer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tx_id:
                  type: string
                payload:
                  type: string
                sender:
                  type: string
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: OK
        '400':
          description: Rejected by FSOC
  /v1/services:
    get:
      summary: Get status of multi-protocol services
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        service_name:
                          type: string
                        status:
                          type: string
                        version:
                          type: string
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /v1/billing/generate-key:
    post:
      summary: Generate developer API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                organization_id:
                  type: string
                developer_email:
                  type: string
                project_name:
                  type: string
      responses:
        '200':
          description: OK
  /v1/billing/telemetry/track-signature:
    post:
      summary: Track signature telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                signature_hash:
                  type: string
                timestamp:
                  type: integer
                hmac:
                  type: string
      responses:
        '200':
          description: OK
  /v1/identity/resolve:
    post:
      summary: Resolve decentralized identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                protocol:
                  type: string
      responses:
        '200':
          description: OK
  /v1/dlc/bond:
    post:
      summary: Create DLC bond
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bond_id:
                  type: string
                principal_sbtc:
                  type: integer
                expiry_height:
                  type: integer
                coupon_rate:
                  type: number
      responses:
        '201':
          description: Created
  /v1/settlement/trigger:
    post:
      summary: Trigger external settlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                external_id:
                  type: string
                payload:
                  type: object
                attestation:
                  type: string
      responses:
        '200':
          description: OK
  /v1/analytics/metrics:
    get:
      summary: Get analytics metrics
      parameters:
        - name: metric
          in: query
          required: true
          schema:
            type: string
        - name: asset
          in: query
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /v1/zkml/verify:
    post:
      summary: Verify ZKML proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proof:
                  type: string
                input_commitment:
                  type: string
                model_id:
                  type: string
      responses:
        '200':
          description: OK

components:
  schemas:
    Bitvm2StateRootVerificationResponse:
      type: object
      additionalProperties: true
      properties:
        state_root:
          type: string
        verified:
          type: boolean
        error:
          type: string
