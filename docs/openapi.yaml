openapi: 3.0.3
info:
  title: Conxian Nexus (Glass Node) API
  description: High-performance middleware for Stacks L1 state synchronization and multi-protocol support.
  version: 0.4.13
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /v1/events:
    get:
      summary: Get canonical cross-chain event feed
      parameters:
        - name: cursor
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventEnvelope"
                  next_cursor:
                    type: integer
  /v1/rgb/contract:
    get:
      summary: Lookup RGB contract metadata
      parameters:
        - name: contract_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  contract_id:
                    type: string
                  status:
                    type: string
                  mode:
                    type: string
                  schema:
                    type: string
        "404":
          description: Not Found
  /admin/v1/status:
    get:
      summary: Legacy protected admin status (compatibility route)
      deprecated: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
        '401':
          description: Unauthorized
  /admin/v1/releases/request-approval:
    post:
      summary: Request release approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - artifactId
                - requestedBy
              properties:
                artifactId:
                  type: string
                requestedBy:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Accepted
  /admin/v1/releases/decision:
    post:
      summary: Submit release decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - artifactId
                - decision
                - actorId
              properties:
                artifactId:
                  type: string
                decision:
                  type: string
                actorId:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Accepted
  /admin/v1/governance/decision:
    post:
      summary: Submit governance decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - actionId
                - decision
                - actorId
              properties:
                actionId:
                  type: string
                decision:
                  type: string
                actorId:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Accepted
  /admin/v1/runtime/health:
    get:
      summary: Get runtime health
      responses:
        '200':
          description: OK
  /admin/v1/runtime/readiness:
    get:
      summary: Get runtime readiness
      responses:
        '200':
          description: OK
  /admin/v1/audit-events:
    get:
      summary: List audit events
      responses:
        '200':
          description: OK
  /admin/v1/chains:
    get:
      summary: List chain runtime status records
      responses:
        '200':
          description: OK
  /admin/v1/chains/{chain}/status:
    get:
      summary: Get chain runtime status
      parameters:
        - in: path
          name: chain
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /admin/v1/attestations:
    get:
      summary: List attestations
      responses:
        '200':
          description: OK
  /admin/v1/attestations/{id}:
    get:
      summary: Get attestation details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /admin/v1/drift:
    get:
      summary: Get runtime drift status
      responses:
        '200':
          description: OK
  /admin/v1/safety-mode:
    get:
      summary: Get safety mode status
      responses:
        '200':
          description: OK
  /admin/v1/safety-mode/ack:
    post:
      summary: Acknowledge safety mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ackBy:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Accepted
  /admin/v1/promotion-evidence/{release}:
    get:
      summary: Get promotion evidence for a release
      parameters:
        - in: path
          name: release
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /admin/v1/environments:
    get:
      summary: List runtime environments
      responses:
        '200':
          description: OK
  /admin/v1/environments/{env}:
    get:
      summary: Get runtime environment details
      parameters:
        - in: path
          name: env
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /v1/status:
    get:
      summary: Get system status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  state_root:
                    type: string
                  mmr_root:
                    type: string
                  processed_height:
                    type: integer
                  safety_mode:
                    type: boolean
                  drift:
                    type: integer
  /metrics:
    get:
      summary: Get Prometheus metrics (text exposition)
      description: Read-only scrape of the default Prometheus registry, including fixed-cardinality BIP-110 Phase 1 assessment metrics.
      responses:
        '200':
          description: Prometheus text exposition
          content:
            'text/plain; version=0.0.4; charset=utf-8':
              schema:
                type: string
  /v1/proof:
    get:
      summary: Get Merkle proof for a transaction
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string
                  proof:
                    type: string
  /v1/mmr-proof:
    get:
      summary: Get MMR inclusion proof for a transaction
      parameters:
        - name: index
          in: query
          schema:
            type: integer
        - name: tx_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaf:
                    type: string
                  pos:
                    type: integer
                  siblings:
                    type: array
                    items:
                      type: array
                      items:
                        oneOf:
                          - type: integer
                          - type: string
                  peaks:
                    type: array
                    items:
                      type: string
                  root:
                    type: string
  /v1/proof/manifest:
    get:
      summary: Get proof manifest (Narrow Proof Surface - Issue #149)
      description: |
        Returns a consolidated view of Nexus proof capabilities for the first proof gate.
        This endpoint provides the minimal verifiable surface for demonstrating Nexus proof integrity.
        
        **Scope for the first proof gate:**
        - Prove Nexus health and service boot integrity
        - Document available proof routes
        - Provide MMR tree information for verification
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProofManifest"
  /v1/verify-state:
    post:
      summary: Verify a state root
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state_root:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  mmr_root:
                    type: string
  /v1/bitvm2/verify-state-root:
    post:
      summary: Verify a BitVM2 state root SNARK proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - state_root
                - proof
              properties:
                state_root:
                  type: string
                proof:
                  type: string
                public_inputs:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bitvm2StateRootVerificationResponse'
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bitvm2StateRootVerificationResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bitvm2StateRootVerificationResponse'
  /v1/execute:
    post:
      summary: Execute a transaction via FSOC Sequencer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tx_id:
                  type: string
                payload:
                  type: string
                sender:
                  type: string
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: OK
        '400':
          description: Rejected by FSOC
  /v1/services:
    get:
      summary: Get status of multi-protocol services
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        service_name:
                          type: string
                        status:
                          type: string
                        version:
                          type: string
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /v1/billing/generate-key:
    post:
      summary: Generate developer API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                organization_id:
                  type: string
                developer_email:
                  type: string
                project_name:
                  type: string
      responses:
        '200':
          description: OK
  /v1/billing/telemetry/track-signature:
    post:
      summary: Track signature telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                signature_hash:
                  type: string
                timestamp:
                  type: integer
                hmac:
                  type: string
      responses:
        '200':
          description: OK
  /v1/identity/resolve:
    post:
      summary: Resolve decentralized identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                protocol:
                  type: string
      responses:
        '200':
          description: OK
  /v1/dlc/bond:
    post:
      summary: Create DLC bond
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bond_id:
                  type: string
                principal_sbtc:
                  type: integer
                expiry_height:
                  type: integer
                coupon_rate:
                  type: number
      responses:
        '201':
          description: Created
  /v1/settlement/trigger:
    post:
      summary: Trigger external settlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                external_id:
                  type: string
                payload:
                  type: object
                attestation:
                  type: string
      responses:
        '200':
          description: OK
  /v1/analytics/metrics:
    get:
      summary: Get STX/Postgres analytics metrics
      description: Query analytics derived from STX transaction data stored in Postgres. This is separate from the Prometheus scrape at /metrics.
      parameters:
        - name: metric
          in: query
          required: true
          schema:
            type: string
        - name: asset
          in: query
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /v1/zkml/verify:
    post:
      summary: Verify ZKML proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                proof:
                  type: string
                input_commitment:
                  type: string
                model_id:
                  type: string
      responses:
        '200':
          description: OK

components:
  schemas:
    Bitvm2StateRootVerificationResponse:
      type: object
      additionalProperties: true
      properties:
        state_root:
          type: string
        verified:
          type: boolean
        error:
          type: string
    EventEnvelope:
      type: object
      properties:
        sequence:
          type: integer
        event_id:
          type: string
        tx_id:
          type: string
        block_height:
          type: integer
        finality:
          type: string
        trust_tier:
          type: string
        proof_reference:
          type: string
        payload:
          type: object
    ProofManifest:
      type: object
      properties:
        health:
          type: object
          properties:
            status:
              type: string
              example: "ok"
            version:
              type: string
              example: "0.4.19"
            safety_mode:
              type: boolean
            uptime_seconds:
              type: integer
              nullable: true
        proof_routes:
          type: object
          properties:
            proof_endpoint:
              type: string
              example: "/v1/proof?key=<key>"
            mmr_proof_endpoint:
              type: string
              example: "/v1/mmr-proof?index=<n>"
            health_endpoint:
              type: string
              example: "/health"
            submit_endpoint:
              type: string
              example: "/v1/submit"
        state_root:
          type: string
          nullable: true
        mmr_info:
          type: object
          properties:
            leaf_count:
              type: integer
              nullable: true
            peaks:
              type: array
              items:
                type: string
            initialized:
              type: boolean
        service:
          type: object
          properties:
            version:
              type: string
            proof_surface_version:
              type: string
            supported_chains:
              type: array
              items:
                type: string
    EVMReceiptProof:
      type: object
      required: [block_hash, transaction_index, proof_nodes, receipt_root]
      properties:
        block_hash:
          type: string
        transaction_index:
          type: integer
        proof_nodes:
          type: array
          items:
            type: string
        receipt_root:
          type: string
    EVMVerificationResult:
      type: object
      properties:
        valid:
          type: boolean
        status:
          type: string
        verified_at_height:
          type: integer
    IBCClientUpdate:
      type: object
      required: [client_id, header, trusted_height]
      properties:
        client_id:
          type: string
        header:
          type: string
        trusted_height:
          type: integer
    IBCVerificationResult:
      type: object
      properties:
        valid:
          type: boolean
        client_id:
          type: string
        latest_height:
          type: integer
        trust_level:
          type: string
