name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to publish (X.Y.Z or vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Stage 1: Hygiene & Contamination Guard
  # ============================================================
  hygiene:
    name: Repo Hygiene & Contamination Guard
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
      with:
        python-version: '3.x'
    - name: Run Contamination Guard
      run: python3 scripts/verify_contamination_guard.py
    - name: Verify Submodule Integrity
      run: python3 scripts/verify_submodule_integrity.py
    - name: Clarity 4 Contract Verification
      run: ./scripts/verify_contracts.sh
    - name: BOS Production Boundary Check
      run: ./scripts/check_production_boundary.sh
    - name: Install Gitleaks
      run: |
        VERSION="8.18.2"
        curl -L https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
        echo "6298c9235dfc9278c14b28afd9b7fa4e6f4a289cb1974bd27949fc1e9122bdee  gitleaks.tar.gz" | sha256sum --check
        tar -xzf gitleaks.tar.gz
        sudo mv gitleaks /usr/local/bin/
    - name: Secret Scanning (Gitleaks)
      run: gitleaks detect --source . -v

  # ============================================================
  # Stage 2: Build, Test & Coverage
  # ============================================================
  build-and-test:
    name: Build & Test
    needs: hygiene
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        submodules: recursive
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
      with:
        toolchain: stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked
    - name: Enforce Lightning scoped coverage (>=90%)
      run: python3 scripts/check_lightning_coverage.py --min-percent 90
    - name: Enforce Bitcoin scoped coverage (>=92%)
      run: ./scripts/coverage_bitcoin.sh 92
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: coverage-artifacts
        path: |
          target/coverage/**/*.json
          target/coverage/**/*.md
        if-no-files-found: warn

  # ============================================================
  # Stage 3: Version Validation & Dry-Run
  # ============================================================
  validate-release:
    name: Validate release metadata
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        fetch-depth: 0
    - name: Install Rust
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      with:
        toolchain: stable
    - name: Determine version
      id: version
      shell: bash
      run: |
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        else
          echo "value=${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
        fi
    - name: Validate version matches Cargo.toml
      shell: bash
      run: |
        version="${{ steps.version.outputs.value }}"
        version="${version#v}"
        cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
        if [[ "${version}" != "${cargo_version}" ]]; then
          echo "error: tag version ${version} != Cargo.toml version ${cargo_version}" >&2
          exit 1
        fi
        echo "Version ${version} matches Cargo.toml"
    - name: Extract changelog for this version
      id: changelog
      shell: bash
      run: |
        version="${{ steps.version.outputs.value }}"
        version="${version#v}"
        # Extract changelog section for this version
        awk -v ver="## [${version}]" '
          $0 ~ ver { found=1; next }
          found && /^## \[/ { exit }
          found { print }
        ' CHANGELOG.md > changelog_body.txt
        body=$(cat changelog_body.txt)
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$body" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    # Note: Package validation skipped - Build & Test stage already validates compilation
    # cargo package requires network access for git dependencies which may fail in CI
    - name: Check for existing release
      id: existing
      shell: bash
      run: |
        version="${{ steps.version.outputs.value }}"
        version="${version#v}"
        if gh release view "v${version}" &>/dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

  # ============================================================
  # Stage 4: Create GitHub Release (Automatic)
  # ============================================================
  create-github-release:
    name: Create GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.validate-release.outputs.existing == 'false'
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      with:
        fetch-depth: 0
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ needs.validate-release.outputs.version }}
        BODY: ${{ needs.validate-release.outputs.changelog }}
      shell: bash
      run: |
        # Determine if prerelease (alpha/beta/rc)
        if [[ "${VERSION}" =~ (alpha|beta|rc) ]]; then
          PRERELEASE="--prerelease"
        else
          PRERELEASE=""
        fi
        gh release create "v${VERSION#v}" \
          --title "Release ${VERSION}" \
          --notes "${BODY}" \
          ${PRERELEASE}

  # ============================================================
  # Stage 5: Publish to crates.io (Automatic on tag)
  # ============================================================
  publish-crates-io:
    name: Publish crate to crates.io
    needs: validate-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    # Auto-publish when triggered by a git tag (not workflow_dispatch)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
    - name: Install Rust
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      with:
        toolchain: stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
    - name: Verify CARGO_REGISTRY_TOKEN
      env:
        TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        if [[ -z "${TOKEN}" ]]; then
          echo "error: CARGO_REGISTRY_TOKEN not set in release environment" >&2
          exit 1
        fi
        echo "CARGO_REGISTRY_TOKEN is configured"
    - name: Publish to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"

  # ============================================================
  # Stage 6: Publish Package Attestation (SBOM/SLSA)
  # ============================================================
  attest-build:
    name: Generate SLSA attestation
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
    - name: Install Rust
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      with:
        toolchain: stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
    - name: Build to generate provenance
      run: cargo build --release
    - name: Attest build
      uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
      with:
        subject-path: './target/release/conxian-nexus'
