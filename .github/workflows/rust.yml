name: Rust

on:
  push:
    branches: [ "main", "staged" ]
  pull_request:
    branches: [ "main", "staged" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  hygiene:
    name: Repo Hygiene & Contamination Guard
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Run Contamination Guard
      run: python3 scripts/verify_contamination_guard.py
    - name: Verify Submodule Integrity
      run: python3 scripts/verify_submodule_integrity.py
    - name: BOS Production Boundary Check (Bash)
      run: ./scripts/check_production_boundary.sh
    - name: Secret Scanning
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & Test
    needs: hygiene
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked
    - name: Enforce Lightning scoped coverage (>=90%)
      run: python3 scripts/check_lightning_coverage.py --min-percent 90
    - name: Enforce Bitcoin scoped coverage (>=95%)
      run: ./scripts/coverage_bitcoin.sh 95
    - name: Publish Bitcoin coverage summary
      if: always()
      run: |
        if [ -f target/coverage/bitcoin/summary.md ]; then
          cat target/coverage/bitcoin/summary.md >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upload Bitcoin coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bitcoin-coverage
        path: |
          target/coverage/bitcoin/llvm-cov-bitcoin.json
          target/coverage/bitcoin/summary.json
          target/coverage/bitcoin/summary.md
        if-no-files-found: warn
