name: Rust

on:
  push:
    branches: [ "main", "staged" ]
  pull_request:
    branches: [ "main", "staged" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hygiene:
    name: Repo Hygiene & Contamination Guard
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Run Contamination Guard
      run: python3 scripts/verify_contamination_guard.py
    - name: Verify Submodule Integrity
      run: python3 scripts/verify_submodule_integrity.py
    - name: Clarity 4 Contract Verification
      run: ./scripts/verify_contracts.sh
    - name: BOS Production Boundary Check (Bash)
      run: ./scripts/check_production_boundary.sh
    - name: Install Gitleaks
      run: |
        VERSION="8.18.2"
        curl -L https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
        tar -xzf gitleaks.tar.gz
        sudo mv gitleaks /usr/local/bin/
    - name: Secret Scanning (Gitleaks)
      run: gitleaks detect --source . -v

  build:
    name: Build & Test
    needs: hygiene
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked
    - name: Enforce Lightning scoped coverage (>=90%)
      run: python3 scripts/check_lightning_coverage.py --min-percent 90
    - name: Enforce Bitcoin scoped coverage (>=95%)
      run: ./scripts/coverage_bitcoin.sh 95
    - name: Publish Bitcoin coverage summary
      if: always()
      run: |
        if [ -f target/coverage/bitcoin/summary.md ]; then
          cat target/coverage/bitcoin/summary.md >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upload Bitcoin coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bitcoin-coverage
        path: |
          target/coverage/bitcoin/llvm-cov-bitcoin.json
          target/coverage/bitcoin/summary.json
          target/coverage/bitcoin/summary.md
        if-no-files-found: warn
